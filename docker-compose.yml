version: '3.11'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - BROKER_URL=redis://redis:6379/0

  agent-alpha:
    build:
      context: .
      dockerfile: Dockerfile.agent
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - BROKER_URL=redis://redis:6379/0
      - AGENT_ID=agent-alpha

  agent-beta:
    build:
      context: .
      dockerfile: Dockerfile.agent 
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - BROKER_URL=redis://redis:6379/0
      - AGENT_ID=agent-beta